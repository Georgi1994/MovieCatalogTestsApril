name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore MovieCatalogApiTests.csproj

      - name: Build project
        run: dotnet build MovieCatalogApiTests.csproj --no-restore

      - name: Run all tests
        run: dotnet test MovieCatalogApiTests.csproj --no-build --verbosity normal
